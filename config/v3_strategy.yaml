# Swing Reversal V3 — 4H 3-Candle Reversal Strategy
# High-conviction, low-frequency trades — exits only via opposite signal or flip

strategy:
  name: swing_reversal_v3
  version: 3

timeframes:
  pattern: H4          # Core pattern detection timeframe
  context: D           # Daily trend context (metadata only, no gating)

pattern:
  min_body_ratio: 0.3  # Candle 1 body must be >= 30% of total range (reject doji)

position:
  max_open_v3_trades: 2
  double_down_enabled: true
  max_double_downs: 1   # Safety cap per instrument
  default_sl_pips: 50   # Notional SL for position sizing only (no actual stop placed)
